# 修改 USB 識別碼，強迫電腦重新識別硬體
CONFIG_USB_DEVICE_VID=0x1D50
CONFIG_USB_DEVICE_PID=0x615F  # 隨便改一個跟之前不同的數字

# 增加藍牙廣播名稱的強制性
CONFIG_ZMK_KEYBOARD_NAME="Tsungyu_Split_V2"
